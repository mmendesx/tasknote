<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
  <!--
    TaskNote app icon — "tile" form of the brand mark.
    Solid lime tile with folded note corner + ink checkmark.
    Self-contained colors: readable on light and dark browser chrome.
    Inline "stroke" form lives in @tasknote/ui BrandMark.vue — same
    geometry family; update both together if the mark changes.
  -->

  <!-- Tile with cut top-right corner (note fold) -->
  <path
    d="M9 1 H20 L31 12 V23 A8 8 0 0 1 23 31 H9 A8 8 0 0 1 1 23 V9 A8 8 0 0 1 9 1 Z"
    fill="#A3E635"
  />

  <!-- Fold flap — darker lime triangle -->
  <path d="M20 1 L31 12 H20 Z" fill="#4D7C0F" />

  <!-- Checkmark — ink -->
  <path
    d="M9.5 17 L14.5 22 L23 11.5"
    stroke="#0B0C0E"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>

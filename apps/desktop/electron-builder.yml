appId: com.tasknote.app
productName: TaskNote
copyright: Copyright © 2024 TaskNote

directories:
  buildResources: build
  output: dist-electron

icon: build/icon.png

# With node-linker=hoisted, electron lives in the workspace root node_modules;
# electron-builder can't resolve it from apps/desktop, so pin explicitly.
# Keep in sync with the electron devDependency.
electronVersion: 31.7.7

# pnpm workspace symlinks: electron-builder cannot follow pnpm's
# virtual-store symlinks when resolving node_modules. The workspace uses
# node-linker=hoisted (root .npmrc) so deps are flat; includeSubNodeModules
# still bundles workspace-linked packages (e.g. @tasknote/api).
includeSubNodeModules: true

# Native .node addons must live outside the asar archive so the OS can dlopen
# them directly. Electron patches require() to extract them, but explicit
# asarUnpack is more reliable and avoids temp-dir path issues on some Linux systems.
asarUnpack:
  - "**/*.node"

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../apps/web/dist
    to: web
    filter:
      - "**/*"

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office

mac:
  target:
    # dmg is what users download; electron-updater can only apply macOS updates
    # from a zip, so both ship and latest-mac.yml references the zip.
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  # Unsigned build: Gatekeeper shows "unidentified developer" until a Developer ID
  # cert is available. Disabling the hardened runtime keeps the unsigned app launchable.
  hardenedRuntime: false
  identity: null

publish:
  provider: github
  owner: mmendesx
  repo: tasknote

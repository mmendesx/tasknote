appId: com.tasknote.app
productName: TaskNote
copyright: Copyright © 2024 TaskNote

directories:
  buildResources: build
  output: dist-electron

icon: build/icon.png

# With node-linker=hoisted, electron lives in the workspace root node_modules;
# electron-builder can't resolve it from apps/desktop, so pin explicitly.
# Keep in sync with the electron devDependency.
electronVersion: 31.7.7

# pnpm workspace symlinks: electron-builder cannot follow pnpm's
# virtual-store symlinks when resolving node_modules. The workspace uses
# node-linker=hoisted (root .npmrc) so deps are flat; includeSubNodeModules
# still bundles workspace-linked packages (e.g. @tasknote/api).
includeSubNodeModules: true

# Native .node addons must live outside the asar archive so the OS can dlopen
# them directly. Electron patches require() to extract them, but explicit
# asarUnpack is more reliable and avoids temp-dir path issues on some Linux systems.
asarUnpack:
  - "**/*.node"

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../apps/web/dist
    to: web
    filter:
      - "**/*"

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office

mac:
  target:
    # dmg is what users download; electron-updater can only apply macOS updates
    # from a zip, so both ship and latest-mac.yml references the zip.
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  # Notarization requires the hardened runtime, which blocks the JIT and unsigned
  # memory Electron needs — hence the entitlements below.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing and notarization are driven by env vars, so a credential-less local
  # build still succeeds (unsigned) while CI produces a signed+notarized app:
  #   CSC_LINK / CSC_KEY_PASSWORD          -> Developer ID signing
  #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID -> notarization
  # electron-builder skips each step when its variables are absent.
  # teamId must be explicit: @electron/notarize does not read APPLE_TEAM_ID
  # from the environment when authenticating with an app-specific password.
  #
  # This is a literal, NOT ${env.APPLE_TEAM_ID}: electron-builder 24.13.3 does
  # not expand env macros inside the notarize block, and the unexpanded string
  # fails deep inside notarytool as "Unexpected token 'E' ... is not valid JSON".
  # Verified empirically — v0.3.2 (literal) notarized, v0.3.3 (macro) did not.
  # CI asserts this value matches the APPLE_TEAM_ID variable before packaging.
  notarize:
    teamId: RMS6H5M4K7

# Unsigned: no Authenticode cert configured, users accept one SmartScreen
# prompt. electron-builder skips signing when no cert env vars are present.
win:
  target:
    - target: nsis
      arch:
        - x64

# electron-builder notarizes the .app before wrapping it in the dmg, so the
# ticket lands on the app (which is what Gatekeeper checks on launch) but the
# disk image itself stays unsigned. Signing it removes the warning when the
# dmg is opened.
dmg:
  sign: true

# Notarizes and staples the dmg itself, after electron-builder has built it.
afterAllArtifactBuild: scripts/notarize-dmg.js

publish:
  provider: github
  owner: mmendesx
  repo: tasknote

name: Release Desktop

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    strategy:
      # One platform failing shouldn't cancel the other's build — a partial
      # release is more useful than none, and the failure is still reported.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifacts: "dist-electron/*.AppImage dist-electron/latest-linux.yml"
          - os: macos-latest
            platform: mac
            artifacts: "dist-electron/*.dmg dist-electron/*-mac.zip dist-electron/latest-mac.yml"
          - os: windows-latest
            platform: win
            artifacts: "dist-electron/*.exe dist-electron/latest.yml"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # Full workspace build so web dist is present for electron-builder to bundle.
        # desktop declares only @tasknote/api as a dep, so --filter desktop... would
        # silently skip the web package and produce a broken artifact.
        run: pnpm build

      - name: Smoke test
        run: pnpm --filter @tasknote/desktop smoke

      - name: Sync version from tag
        # electron-builder derives artifact + latest-*.yml version from
        # package.json; a stale version silently breaks auto-update.
        working-directory: apps/desktop
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - name: Verify notarization credentials
        # electron-builder reports notarytool auth failures as an opaque
        # "is not valid JSON" parse error after a full build. Failing here
        # instead surfaces Apple's actual message in seconds.
        if: matrix.platform == 'mac'
        run: |
          if [[ ! "$APPLE_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "::error::APPLE_TEAM_ID must be a 10-char team ID, got: '$APPLE_TEAM_ID'"
            echo "Set it with: gh variable set APPLE_TEAM_ID"
            exit 1
          fi
          # electron-builder can't read this variable (env macros don't expand in
          # the notarize block), so the yml carries a literal — assert they agree.
          CONFIGURED=$(grep -A1 '^  notarize:' apps/desktop/electron-builder.yml | grep teamId | awk '{print $2}')
          if [[ "$CONFIGURED" != "$APPLE_TEAM_ID" ]]; then
            echo "::error::electron-builder.yml teamId '$CONFIGURED' != APPLE_TEAM_ID variable '$APPLE_TEAM_ID'"
            exit 1
          fi
          echo "teamId: $APPLE_TEAM_ID (matches electron-builder.yml)"
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" >/dev/null
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - name: Package
        run: pnpm --filter @tasknote/desktop exec electron-builder --${{ matrix.platform }} --publish never
        env:
          # Empty on the Linux job — electron-builder skips signing when unset,
          # so one step serves both platforms.
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # Public identifier (embedded in every signature), so a variable, not a secret.
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - name: Packaged smoke test
        # Verifies native modules (better-sqlite3) load under the Electron ABI
        # inside the actual artifact — the plain-Node smoke test cannot catch this.
        working-directory: apps/desktop
        run: bash scripts/smoke-packaged.sh

      - name: Publish release assets
        working-directory: apps/desktop
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" || true
          # blockmap only exists when electron-builder runs differential publishing — upload what's there
          gh release upload "$GITHUB_REF_NAME" ${{ matrix.artifacts }} $(ls dist-electron/*.blockmap 2>/dev/null) --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

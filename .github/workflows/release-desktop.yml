name: Release Desktop

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # Full workspace build so web dist is present for electron-builder to bundle.
        # desktop declares only @tasknote/api as a dep, so --filter desktop... would
        # silently skip the web package and produce a broken AppImage.
        run: pnpm build

      - name: Smoke test
        run: pnpm --filter @tasknote/desktop smoke

      - name: Sync version from tag
        # electron-builder derives artifact + latest-linux.yml version from
        # package.json; a stale version silently breaks auto-update.
        working-directory: apps/desktop
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - name: Package
        run: pnpm --filter @tasknote/desktop exec electron-builder --linux --publish never

      - name: Packaged smoke test (AppImage under xvfb)
        # Verifies native modules (better-sqlite3) load under the Electron ABI
        # inside the actual artifact — the plain-Node smoke test cannot catch this.
        working-directory: apps/desktop
        run: bash scripts/smoke-appimage.sh

      - name: Publish release assets
        working-directory: apps/desktop
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" || true
          gh release upload "$GITHUB_REF_NAME" dist-electron/*.AppImage dist-electron/*.blockmap dist-electron/latest-linux.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

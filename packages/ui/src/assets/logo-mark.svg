<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <!--
    TaskNote mark — canonical stroke form (same geometry as BrandMark.vue).
    Standalone asset: currentColor outline; check hardcoded lime so the
    accent survives <img>/URL usage where CSS vars don't resolve.
  -->

  <!-- Note sheet with folded corner -->
  <path
    d="M6 3 H21 L27 9 V29 H6 Z"
    stroke="currentColor"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Fold crease -->
  <path
    d="M21 3 V9 H27"
    stroke="currentColor"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Checkmark — brand accent -->
  <path
    d="M11 17 L15 21 L23 12"
    stroke="#A3E635"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>

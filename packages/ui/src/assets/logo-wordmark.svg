<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 32" fill="none" aria-label="tasknote">
  <!--
    TaskNote wordmark: mark on left, "tasknote" text on right.
    Text uses system geometric sans via <text> element.
  -->

  <!-- Mark (scaled to 24x24, vertically centered in 32px height) -->
  <g transform="translate(0, 4) scale(0.75)">
    <!-- Note body -->
    <path
      d="M6 4 H22 L26 8 V28 H6 Z"
      stroke="currentColor"
      stroke-width="2"
      stroke-linejoin="round"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Fold -->
    <path
      d="M22 4 L22 8 H26"
      stroke="currentColor"
      stroke-width="2"
      stroke-linejoin="round"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Checkmark -->
    <path
      d="M10 17 L14 21 L22 10"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Wordmark text: "tasknote" lowercase geometric sans -->
  <text
    x="30"
    y="22"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-size="16"
    font-weight="500"
    letter-spacing="-0.3"
    fill="currentColor"
  >tasknote</text>
</svg>
